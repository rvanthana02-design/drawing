<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme Colors */
            --bg-light: #e0e5ec;
            --shadow-light-1: rgba(255, 255, 255, 0.7);
            --shadow-light-2: rgba(163, 177, 198, 0.7);
            --text-light: #444;
            --accent: #378ADD;
        }

        .dark-theme {
            /* Dark Theme Colors */
            --bg-light: #2d3436;
            --shadow-light-1: rgba(255, 255, 255, 0.05);
            --shadow-light-2: rgba(0, 0, 0, 0.5);
            --text-light: #dfe6e9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s ease;
        }

        .calc-container {
            width: 320px;
            padding: 25px;
            background: var(--bg-light);
            border-radius: 30px;
            box-shadow: 9px 9px 16px var(--shadow-light-2), 
                        -9px -9px 16px var(--shadow-light-1);
        }

        /* Theme Toggle Switch */
        .theme-toggle {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .toggle-btn {
            width: 50px;
            height: 25px;
            background: var(--bg-light);
            border-radius: 15px;
            box-shadow: inset 2px 2px 5px var(--shadow-light-2), 
                        inset -2px -2px 5px var(--shadow-light-1);
            position: relative;
            cursor: pointer;
        }

        .toggle-circle {
            width: 21px;
            height: 21px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .dark-theme .toggle-circle {
            transform: translateX(25px);
            background: #f1c40f;
        }

        /* Screen Display */
        #display {
            width: 100%;
            height: 60px;
            background: var(--bg-light);
            border: none;
            border-radius: 10px;
            box-shadow: inset 6px 6px 12px var(--shadow-light-2), 
                        inset -6px -6px 12px var(--shadow-light-1);
            margin-bottom: 25px;
            text-align: right;
            padding: 0 15px;
            font-size: 24px;
            color: var(--text-light);
            outline: none;
        }

        /* Buttons Grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            width: 55px;
            height: 55px;
            background: var(--bg-light);
            border: none;
            border-radius: 50%;
            font-size: 18px;
            font-weight: 500;
            color: var(--text-light);
            box-shadow: 5px 5px 10px var(--shadow-light-2), 
                        -5px -5px 10px var(--shadow-light-1);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:active {
            box-shadow: inset 3px 3px 6px var(--shadow-light-2), 
                        inset -3px -3px 6px var(--shadow-light-1);
            transform: scale(0.95);
        }

        .operator { color: var(--accent); font-weight: 600; }
        .clear { color: #e74c3c; }
        .equal {
            grid-column: span 2;
            width: 125px;
            border-radius: 30px;
            background: var(--accent);
            color: white;
        }
    </style>
</head>
<body>

    <div class="calc-container">
        <div class="theme-toggle">
            <div class="toggle-btn" onclick="toggleTheme()">
                <div class="toggle-circle"></div>
            </div>
        </div>

        <input type="text" id="display" readonly value="0">

        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            <button class="operator" onclick="appendValue('*')">×</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('-')">-</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('.')">.</button>
            
            <button onclick="appendValue('0')">0</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
        }

        function appendValue(val) {
            if (display.value === '0') {
                display.value = val;
            } else {
                display.value += val;
            }
        }

        function clearDisplay() {
            display.value = '0';
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
            if (display.value === '') display.value = '0';
        }

        function calculate() {
            try {
                // Using eval safely for a simple calculator
                display.value = eval(display.value.replace('×', '*'));
            } catch (error) {
                display.value = "Error";
                setTimeout(clearDisplay, 1500);
            }
        }

        // Add keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= 0 && e.key <= 9) appendValue(e.key);
            if (e.key === '+') appendValue('+');
            if (e.key === '-') appendValue('-');
            if (e.key === '*') appendValue('*');
            if (e.key === '/') appendValue('/');
            if (e.key === '.') appendValue('.');
            if (e.key === 'Enter') calculate();
            if (e.key === 'Backspace') deleteLast();
            if (e.key === 'Escape') clearDisplay();
        });
    </script>
</body>
</html>
