<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Cyber Canvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #7000ff;
            --bg-dark: #0a0a0f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: white;
        }

        /* Toolbar Styles */
        .toolbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .tool-group { display: flex; align-items: center; gap: 10px; }

        label { font-size: 10px; text-transform: uppercase; color: var(--neon-cyan); }

        input[type="color"] {
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            background: none;
        }

        input[type="range"] { cursor: pointer; accent-color: var(--neon-cyan); }

        .btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .btn.active {
            background: var(--neon-purple);
            border-color: var(--neon-purple);
            color: white;
        }

        /* Canvas Container */
        #canvasContainer {
            flex-grow: 1;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        canvas { display: block; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="tool-group">
            <label>Color</label>
            <input type="color" id="colorPicker" value="#00f2ff">
        </div>

        <div class="tool-group">
            <label>Size</label>
            <input type="range" id="sizeSlider" min="1" max="50" value="5">
        </div>

        <div class="tool-group">
            <button class="btn" id="neonBtn" onclick="toggleNeon()">Neon Off</button>
            <button class="btn" onclick="clearCanvas()">Clear</button>
            <button class="btn" onclick="saveCanvas()">Save PNG</button>
        </div>
    </div>

    <div id="canvasContainer">
        <canvas id="mainCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const sizeSlider = document.getElementById('sizeSlider');
        const neonBtn = document.getElementById('neonBtn');

        let painting = false;
        let isNeon = false;

        // Resize Canvas to fit screen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Set initial background
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Drawing Logic
        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath(); // Resets path so lines don't connect
        }

        function draw(e) {
            if (!painting) return;

            ctx.lineWidth = sizeSlider.value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = colorPicker.value;

            // Neon Effect Configuration
            if (isNeon) {
                ctx.shadowBlur = sizeSlider.value;
                ctx.shadowColor = colorPicker.value;
            } else {
                ctx.shadowBlur = 0;
            }

            // Support for mouse and touch
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // Event Listeners
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);

        // Touch support for mobile
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        canvas.addEventListener('touchend', finishedPosition);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

        // Tool Functions
        function toggleNeon() {
            isNeon = !isNeon;
            neonBtn.innerText = isNeon ? "Neon On" : "Neon Off";
            neonBtn.classList.toggle('active');
        }

        function clearCanvas() {
            if(confirm("Wipe the canvas?")) {
                ctx.fillStyle = '#0a0a0f';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function saveCanvas() {
            const link = document.createElement('a');
            link.download = 'cyber-drawing.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
